<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - পৃষ্ঠা পাওয়া যায়নি | Kawsar Hosen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background: #151828;
            color: #ffffff;
        }

        .error-content {
            background: #24273b;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .error-code {
            font-size: 5rem;
            font-weight: bold;
            color: #5aa1e3;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .error-title {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .error-message {
            font-size: 1rem;
            color: #cccccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .error-icon {
            font-size: 4rem;
            color: #5aa1e3;
            margin-bottom: 20px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #5aa1e3;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.3s;
            font-weight: 600;
        }

        .btn:hover {
            background: #4a8ec7;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #2c3046;
            color: #5aa1e3;
            border: 2px solid #5aa1e3;
        }

        .btn-secondary:hover {
            background: #3a3f54;
        }

        .footer-404 {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="error-code">404</div>
            <h1 class="error-title">পৃষ্ঠা পাওয়া যায়নি!</h1>
            <p class="error-message">
                দুঃখিত! আপনি যে পৃষ্ঠাটি খুঁজছেন তা পাওয়া যায়নি। 
                <br>এটি হয়তো সরানো হয়েছে বা ভুল URL হতে পারে।
            </p>

            <div class="action-buttons">
                <a href="/" class="btn">
                    <i class="fas fa-home"></i> হোমপেজে ফিরুন
                </a>
                <button class="btn btn-secondary" onclick="history.back()">
                    <i class="fas fa-arrow-left"></i> পূর্ববর্তী পৃষ্ঠায় ফিরুন
                </button>
            </div>

            <div class="footer-404">
                <p>&copy; 2026 Kawsar Hosen. All rights reserved.</p>
            </div>
        </div>
    </div>
</body>
</html>
