<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kawsar Hosen</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ffffff,#f1f1f1);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
max-width:420px;
width:100%;
text-align:center;
}

.header{
font-size:28px;
font-weight:700;
margin-bottom:20px;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
margin-bottom:15px;
}

.card{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(15px);
border-radius:15px;
padding:18px;
margin-top:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
}

.title{
font-weight:600;
margin-bottom:8px;
}

.info{
font-size:14px;
color:#444;
}

.footer{
margin-top:25px;
font-size:13px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
Kawsar Hosen
</div>

<img src="profile.jpg" class="logo">

<div class="card">
<div class="title">About Me</div>
<div class="info">
Hi, I'm Kawsar Hosen.  
Developer & digital creator building modern web experiences.
</div>
</div>

<div class="card">
<div class="title">Contact</div>
<div class="info">
📧 Email: your@email.com<br>
📞 Phone: +88000000000
</div>
</div>

<div class="card">
<div class="title">Address</div>
<div class="info">
Bangladesh
</div>
</div>

<div class="footer">
© 2026 Kawsar Hosen
</div>

</div>

</body>
</html>
