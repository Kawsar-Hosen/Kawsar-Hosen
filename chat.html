<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <script src="https://api.gemini.com/v1/gemini.js"></script>
    <script>
        // Multi-language support
        const languages = {
            en: { greeting: 'Welcome to the Chat!', riddlePrompt: 'Here’s a riddle for you:' },
            bn: { greeting: 'চ্যাটে স্বাগতম!', riddlePrompt: 'এটি আপনার জন্য একটি রিডল:' },
            hi: { greeting: 'चैट में आपका स्वागत है!', riddlePrompt: 'यहाँ आपके लिए एक पहेली है:' }
        };
        let selectedLang = 'en'; // Default language

        // Chat modes
        const chatModes = ['Conversation', 'Information', 'Fun', 'Truth or Dare', 'Riddles', 'Story Telling'];

        function setLanguage(lang) {
            selectedLang = lang;
            updateChatInterface();
        }

        function updateChatInterface() {
            const greeting = languages[selectedLang].greeting;
            document.getElementById('greeting').innerText = greeting;
        }

        // Function to handle chat modes
        function startChat(mode) {
            // Logic based on selected chat mode
            switch (mode) {
                case 'Riddles':
                    askRiddle();
                    break;
                // Add more cases for other chat modes
                default:
                    alert('Chat mode selected: ' + mode);
            }
        }

        function askRiddle() {
            const prompt = languages[selectedLang].riddlePrompt;
            const riddle = 'I speak without a mouth and hear without ears. I have no body, but I come alive with the wind. What am I?';
            const answer = prompt + '\n' + riddle;
            alert(answer);
        }
    </script>
</head>
<body onload="updateChatInterface()">
    <h1 id="greeting"></h1>

        <label for="language-select">Select Language:</label>
        <select id="language-select" onchange="setLanguage(this.value)">

            <option value="bn">Bangla</option>
            <option value="hi">Hindi</option>
        </select>
